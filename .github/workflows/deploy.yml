name: Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Hostinger to pull latest code
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://webhooks.hostinger.com/deploy/a9391dcb880bc52106a0c256d1956bee" \
            -H "Content-Type: application/json" \
            --data '{}' | grep -q "^2" && echo "✅ Deploy triggered successfully" || echo "⚠️ Deploy trigger returned non-2xx"
